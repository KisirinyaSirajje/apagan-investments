<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="grad-sb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d5c3a" />
      <stop offset="100%" stop-color="#138855" />
    </linearGradient>
    <linearGradient id="bg-grad-sb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f7f4" />
      <stop offset="100%" stop-color="#e1efe9" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <rect width="100%" height="100%" fill="url(#bg-grad-sb)" rx="150" />
  <!-- Outer ring -->
  <circle cx="150" cy="150" r="145" fill="none" stroke="url(#grad-sb)" stroke-width="4" stroke-dasharray="8 6" opacity="0.6"/>
  <!-- User Silhouette -->
  <g fill="url(#grad-sb)">
    <!-- Head -->
    <circle cx="150" cy="115" r="48" />
    <!-- Shoulders -->
    <path d="M70,245 C70,185 105,175 150,175 C195,175 230,185 230,245 Z" />
  </g>
  <!-- Initials overlay badge -->
  <rect x="100" y="225" width="100" height="34" rx="17" fill="#0d5c3a" />
  <text x="150" y="248" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="1">SB - MD</text>
</svg>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Apagan Investments Ug</title>
  <meta name="robots" content="noindex, follow">

  <!-- Favicon -->
  <link rel="icon" type="image/jpeg" href="assets/images/apagan.jpeg">
  <link rel="apple-touch-icon" href="assets/images/apagan.jpeg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--space-8);
      background-color: var(--color-bg);
    }
    .error-code {
      font-family: var(--font-heading);
      font-size: 8rem;
      font-weight: 800;
      color: var(--color-primary);
      line-height: 1;
      margin-bottom: var(--space-4);
      position: relative;
      display: inline-block;
    }
    .error-code::after {
      content: '';
      position: absolute;
      bottom: 10px;
      left: 0;
      width: 100%;
      height: 20px;
      background-color: var(--color-secondary);
      z-index: -1;
      opacity: 0.5;
    }
    .error-title {
      font-family: var(--font-heading);
      font-size: var(--fs-2xl);
      color: var(--text-dark);
      margin-bottom: var(--space-3);
    }
    .error-desc {
      color: var(--text-light);
      max-width: 500px;
      margin: 0 auto var(--space-6);
    }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="container">
      <div class="error-code">404</div>
      <h1 class="error-title">Page Not Found</h1>
      <p class="error-desc">The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
      <a href="index.html" class="btn btn--primary btn--lg">Back to Home</a>
    </div>
  </div>
</body>
</html>
